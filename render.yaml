services:
  - type: web
    name: akylman-quiz
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Akylman Quiz <onboarding@resend.dev>"
      - key: DATABASE_URL
        fromDatabase:
          name: akylman-db
          property: connectionString

databases:
  - name: akylman-db
    databaseName: akylman_quiz
    user: akylman_admin
    plan: free
