<script>
// Use sessionStorage instead of localStorage - cleared when tab closes
const ADMIN_LOGIN_PATH = '/adm-7b3d9f2a-login';
const ADMIN_PANEL_PATH = '/adm-7b3d9f2a';

const adminToken = sessionStorage.getItem('akylman_admin_token');
if (!adminToken) {
  window.location.href = ADMIN_LOGIN_PATH;
}

function logoutAdmin() {
  if (confirm('Вы уверены, что хотите выйти?')) {
    sessionStorage.removeItem('akylman_admin_token');
    window.location.href = ADMIN_LOGIN_PATH;
  }
}

function aHeaders(){ 
  const token = sessionStorage.getItem('akylman_admin_token') || '';
  return { 'Content-Type':'application/json', 'Authorization': token ? `Bearer ${token}` : '' };
}
function aAuthHeaders(){
  const token = sessionStorage.getItem('akylman_admin_token') || '';
  return token ? { 'Authorization': `Bearer ${token}` } : {};
}

async function adminFetch(url, options = {}) {
  const headers = { ...(options.headers || {}), ...aAuthHeaders() };
  const res = await fetch(url, { ...options, headers });
  if (res.status === 401 || res.status === 403) {
    sessionStorage.removeItem('akylman_admin_token');
    window.location.href = ADMIN_LOGIN_PATH;
    throw new Error('Unauthorized');
  }
  return res;
}
const content = document.getElementById('content');

// Helper functions for better UI
function showAlert(message, type = 'info') {
  const alertDiv = document.createElement('div');
  alertDiv.className = `admin-alert ${type}`;
  alertDiv.textContent = message;
  content.insertBefore(alertDiv, content.firstChild);
  setTimeout(() => alertDiv.remove(), 3000);
}

function showLoading(message = 'Загрузка...') {
  content.innerHTML = `<div class="admin-loading">${message}</div>`;
}

function setActiveTab(activeButton) {
  document.querySelectorAll('.admin-nav button').forEach(btn => btn.classList.remove('active'));
  activeButton.classList.add('active');
}

function toDatetimeLocalValue(iso){
  if(!iso) return '';
  try{
    const d = new Date(iso);
    if(isNaN(d.getTime())) return '';
    const pad = (n)=> String(n).padStart(2,'0');
    const yyyy = d.getFullYear();
    const mm = pad(d.getMonth()+1);
    const dd = pad(d.getDate());
    const hh = pad(d.getHours());
    const mi = pad(d.getMinutes());
    return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
  }catch{ return ''; }
}

        <label>📝 Название<input id="t_title" class="admin-input"/></label>
        <label>📄 Описание<input id="t_desc" class="admin-input"/></label>
      </div>
      <div class="form-row">
        <label>🌐 Язык<select id="t_lang" class="admin-input"><option value="ru">🇷🇺 RU</option><option value="ky">🇰🇬 KY</option></select></label>
        <label>⏱️ Длительность (мин)<input id="t_dur" class="admin-input" type="number" value="60"/></label>

        <label>🕐 Конец окна<input id="t_end" class="admin-input" type="datetime-local"/></label>
      </div>
      <div class="form-row">
        <label>📂 Категория
          <select id="t_category" class="admin-input">
            <option value="">Выберите категорию</option>
            ${cats.map(c=>`<option value="${c.id}">${esc(c.name_ru || '')}</option>`).join('')}
          </select>
        </label>
      </div>
      <div style="margin-top:8px; display:flex; gap:4px; flex-wrap:wrap;">
        <button class="admin-button success" id="addTest">➕ Создать тест</button>
        <button class="admin-button danger" id="resetTests">🧹 Удалить все тесты</button>
      </div>
    </div>
    <div class="admin-table-wrapper">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Язык</th>
            <th>Длит.</th>
            <th>Окно</th>
            <th>Категория</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody>
          ${tests.length > 0 ? tests.map(t=>`<tr>
            <td>${t.id}</td>
            <td>${esc(t.title||'')}</td>
            <td>${esc(t.lang||'ru')}</td>
            <td>${t.duration_minutes||60} мин</td>
            <td>${esc(t.window_start||'-')} → ${esc(t.window_end||'-')}</td>
            <td>${esc(t.category_name_ru || '')}</td>
            <td>
              <div class="admin-table-actions">
                <button data-id="${t.id}" class="admin-button secondary edit">✏️ Редакт.</button>
                <button data-id="${t.id}" class="admin-button danger del">🗑️ Удалить</button>
                <button data-id="${t.id}" class="admin-button qs">❓ Вопросы</button>
              </div>
            </td>
          </tr>`).join('') : '<tr><td colspan="6" style="text-align:center;padding:12px;color:#718096">Нет тестов</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('addTest').onclick = async ()=>{
    const titleV = val('t_title');
    if(!titleV){ showAlert('Введите название теста', 'error'); return; }
    const catV = val('t_category');
    if (!catV) {
      showAlert('Выберите категорию для теста', 'error');
      return;
    }
    const body = {
      title: titleV,
      description: val('t_desc'),
      lang: val('t_lang'),
      duration_minutes: num('t_dur'),
      window_start: val('t_start') ? new Date(val('t_start')).toISOString() : null,
      window_end: val('t_end') ? new Date(val('t_end')).toISOString() : null,
      category_id: catV
    };
    const r = await adminFetch('/api/admin/tests',{ method:'POST', headers: aHeaders(), body: JSON.stringify(body) });
    if(!r.ok){ let msg=''; try{ msg = await r.text(); }catch{} showAlert('Ошибка создания'+(msg?': '+msg:''), 'error'); return; }

      if(!r.ok){
        const errorText = await r.text();
        let errorMsg = 'Ошибка удаления всех тестов';
        try {
          const errorJson = JSON.parse(errorText);
          errorMsg += ': ' + (errorJson.error || errorText);
        } catch {
          errorMsg += ': ' + errorText;

        showAlert(errorMsg, 'error');
        console.error('Delete all tests error:', errorText);
        return;

      showAlert('Все тесты и результаты удалены', 'success');
      renderTests();
    } catch (e) {
      showAlert('Ошибка удаления всех тестов: ' + e.message, 'error');
      console.error('Delete all tests exception:', e);
    }
  };
  content.querySelectorAll('button.edit').forEach(b=> b.onclick = ()=> editTest(b.dataset.id));
  content.querySelectorAll('button.del').forEach(b=> b.onclick = ()=> deleteTest(b.dataset.id));
  content.querySelectorAll('button.qs').forEach(b=> b.onclick = ()=> renderQuestions(parseInt(b.dataset.id,10)));
}
async function editTest(id){

    adminFetch('/api/admin/tests',{ headers: aHeaders() }),
    adminFetch('/api/admin/categories',{ headers: aHeaders() })
  ]);
  const tests = await testsRes.json();
  const cats = catsRes.ok ? await catsRes.json() : [];
  const t = tests.find(x=> x.id==id);
  if(!t){ showAlert('Тест не найден', 'error'); return; }
  content.innerHTML = `
    <div class="admin-form">
      <h3>✏️ Редактирование теста #${t.id}</h3>
      <div class="form-row"><label>📝 Название<input id="t_title" class="admin-input" value="${esc(t.title)}"/></label><label>📄 Описание<input id="t_desc" class="admin-input" value="${esc(t.description||'')}"/></label></div>
      <div class="form-row"><label>🌐 Язык<select id="t_lang" class="admin-input"><option value="ru" ${t.lang==='ru'?'selected':''}>🇷🇺 RU</option><option value="ky" ${t.lang==='ky'?'selected':''}>🇰🇬 KY</option></select></label><label>⏱️ Длительность<input id="t_dur" class="admin-input" type="number" value="${t.duration_minutes}"/></label></div>
      <div class="form-row"><label>🕐 Начало окна<input id="t_start" class="admin-input" type="datetime-local" value="${toDatetimeLocalValue(t.window_start)}"/></label><label>🕐 Конец окна<input id="t_end" class="admin-input" type="datetime-local" value="${toDatetimeLocalValue(t.window_end)}"/></label></div>
      <div class="form-row">
        <label>📂 Категория
          <select id="t_category" class="admin-input">
            <option value="">Выберите категорию</option>
            ${cats.map(c=>`<option value="${c.id}" ${t.category_id===c.id?'selected':''}>${esc(c.name_ru || '')}</option>`).join('')}
          </select>
        </label>
      </div>
      <div style="margin-top:8px"><button class="admin-button success" id="save">💾 Сохранить</button> <button class="admin-button secondary" id="back">⬅️ Назад</button></div>
    </div>
  `;
  document.getElementById('back').onclick = renderTests;
  document.getElementById('save').onclick = async ()=>{
    const titleV = val('t_title');
    if(!titleV){ showAlert('Введите название теста', 'error'); return; }
    const catV = val('t_category');
    if (!catV) {
      showAlert('Выберите категорию для теста', 'error');
      return;
    }
    const body = {
      title: titleV,
      description: val('t_desc'),
      lang: val('t_lang'),
      duration_minutes: num('t_dur'),
      window_start: val('t_start') ? new Date(val('t_start')).toISOString() : null,
      window_end: val('t_end') ? new Date(val('t_end')).toISOString() : null,
      category_id: catV
    };
    const r = await adminFetch('/api/admin/tests/'+id,{ method:'PUT', headers: aHeaders(), body: JSON.stringify(body) });
    if(!r.ok){ let msg=''; try{ msg = await r.text(); }catch{} showAlert('Ошибка сохранения'+(msg?': '+msg:''), 'error'); return; }
    showAlert('Тест обновлен!', 'success');
    renderTests();
  };
}
let pendingDeleteTestId = null;

function showDeleteTestModal(id) {
  pendingDeleteTestId = id;
  const modal = document.getElementById('deleteTestModal');
  modal.style.display = 'flex';
}

function hideDeleteTestModal() {
  const modal = document.getElementById('deleteTestModal');
  modal.style.display = 'none';
  pendingDeleteTestId = null;
}

async function confirmDeleteTest() {
  if (!pendingDeleteTestId) return;
  const id = pendingDeleteTestId;
  hideDeleteTestModal();
  
  try {
    const r = await adminFetch('/api/admin/tests/' + id, { method: 'DELETE', headers: aHeaders() });
    if (!r.ok) {
      showAlert('Ошибка удаления', 'error');
      return;
    }
    showAlert('Тест удален!', 'success');
    renderTests();
  } catch (e) {
    showAlert('Ошибка удаления: ' + e.message, 'error');
  }
}

// Инициализация обработчиков модального окна (выполняется сразу, так как модальное окно уже в DOM)
(function initDeleteModal() {
  const modal = document.getElementById('deleteTestModal');
  const closeBtn = document.getElementById('closeDeleteModal');
  const cancelBtn = document.getElementById('cancelDeleteTest');
  const confirmBtn = document.getElementById('confirmDeleteTest');
  
  if (closeBtn) closeBtn.onclick = hideDeleteTestModal;
  if (cancelBtn) cancelBtn.onclick = hideDeleteTestModal;
  if (confirmBtn) confirmBtn.onclick = confirmDeleteTest;
  
  // Закрытие при клике вне модального окна
  if (modal) {
    modal.onclick = (e) => {
      if (e.target === modal) hideDeleteTestModal();
    };
  }
  
  // Закрытие по Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal && modal.style.display === 'flex') {
      hideDeleteTestModal();
    }
  });
})();

async function deleteTest(id) {
  showDeleteTestModal(id);
}

async function renderCategories(){

async function deleteCategory(id){

  const r=await adminFetch('/api/admin/categories/'+id,{ method:'DELETE', headers:aHeaders() }); 
  if(!r.ok){ showAlert('Ошибка удаления', 'error'); return; } 
  showAlert('Категория удалена!', 'success');
  renderCategories(); 
}

let currentTestId = null;
async function renderQuestions(testId){
  if(testId) currentTestId = testId;
  if(!currentTestId){
    // prompt to pick test
    const tr = await adminFetch('/api/admin/tests',{ headers: aHeaders() });

  const qList = document.getElementById('qList');

  async function saveAllQuestions(){
    const btn = document.getElementById('saveAllQuestions');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = '💾 Сохранение...';
    
    const cards = Array.from(qList.querySelectorAll('.card'));
    let errors = [];
    let saved = 0;
    
    for(let i = 0; i < cards.length; i++){
      const card = cards[i];
      const qid = card.dataset.qid;
      const typeSel = card.querySelector('.q-type');
      const type = typeSel ? typeSel.value : 'mcq';
      const text = (card.querySelector('.q-text')?.value || '').trim();
      const points = parseInt(card.querySelector('.q-points')?.value || '1', 10) || 1;
      
      let options = null;
      let correct = '';
      
      if(type === 'mcq'){
        const optsWrap = card.querySelector('.opts');
        if(optsWrap){
          const res = collectOptionsFrom(optsWrap);
          options = res.options;
          correct = res.correct;
        }
      } else {
        correct = (card.querySelector('.q-correct-text')?.value || '').trim();
      }
      
      if(!text){
        continue; // Пропускаем пустые вопросы
      }
      
      // Если options пустой массив, отправляем null
      if(Array.isArray(options) && options.length === 0){
        options = null;
      }
      
      const ordinal = i + 1;
      
      try{
        if(qid){
          // Обновление существующего вопроса
          const payload = { ordinal, text, options, correct, points };
          const r = await adminFetch('/api/admin/questions/'+qid, { method:'PUT', headers:aHeaders(), body: JSON.stringify(payload) });
          if(!r.ok){
            errors.push(`Вопрос #${ordinal}: ошибка сохранения`);
            continue;
          }
        } else {
          // Создание нового вопроса
          const payload = { ordinal, text, options, correct, points };
          const r = await adminFetch('/api/admin/tests/'+currentTestId+'/questions', { method:'POST', headers:aHeaders(), body: JSON.stringify(payload) });
          if(!r.ok){
            errors.push(`Вопрос #${ordinal}: ошибка создания`);
            continue;
          }
        }
        saved++;
      } catch(e){
        errors.push(`Вопрос #${ordinal}: ${e.message}`);
      }
    }
    
    btn.disabled = false;
    btn.textContent = originalText;
    
    if(errors.length > 0){
      showAlert(`Сохранено: ${saved}, ошибок: ${errors.length}`, 'error');
    } else {
      showAlert(`Все вопросы сохранены (${saved})`, 'success');
    }
    
    // Перерисовываем список для обновления ordinals и удаления пустых карточек
    renderQuestions(currentTestId);
  }
  
  document.getElementById('saveAllQuestions').onclick = saveAllQuestions;

  function createOptionRow(initialValue='', groupName, isChecked=false){
    const row = document.createElement('div');
    row.className = 'form-row';
    row.innerHTML = `
      <div style="display:flex;align-items:center;gap:4px;width:100%">
        <input type="radio" class="q-correct-radio" name="${groupName}" ${isChecked?'checked':''} title="Правильный" style="flex-shrink:0"/>
        <input class="admin-input opt" placeholder="Вариант ответа" value="${esc(initialValue)}" style="flex:1; min-width:0; max-width:calc(100% - 100px)"/>
        <button class="admin-button danger opt-del" title="Удалить вариант" style="padding:8px 12px; flex-shrink:0; white-space:nowrap">✖ Удалить</button>
      </div>
    `;
    const input = row.querySelector('input.opt');
    const delBtn = row.querySelector('.opt-del');
    delBtn.onclick = (e)=>{ e.preventDefault(); row.remove(); };
    input.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const parent = row.parentElement; // .opts
        const newRow = createOptionRow('', groupName, false);
        parent.insertBefore(newRow, row.nextSibling);
        newRow.querySelector('input.opt').focus();
      } else if(e.key==='Backspace' && input.value===''){
        const parent = row.parentElement;
        const siblings = Array.from(parent.querySelectorAll('.form-row'));
        if(siblings.length>1){ // не оставляем пустой контейнер
          e.preventDefault();
          const prev = row.previousElementSibling || row.nextElementSibling;
          row.remove();
          if(prev) prev.querySelector('input.opt')?.focus();
        }
      }
    });
    return row;
  }

  function collectOptionsFrom(container){
    const rows = Array.from(container.querySelectorAll('.form-row'));
    const options = [];
    let correctIdx = '';
    for(const r of rows){
      const val = (r.querySelector('input.opt')?.value||'').trim();
      const checked = !!r.querySelector('input.q-correct-radio')?.checked;
      if(val){
        if(checked && correctIdx===''){ correctIdx = String(options.length); }
        options.push(val);
      }
    }
    return { options, correct: correctIdx };
  }

  async function saveNewQuestion(blank){
    const type = blank.querySelector('.q-type').value;
    const text = blank.querySelector('.q-text').value.trim();
    const points = parseInt(blank.querySelector('.q-points').value||'1',10)||1;
    let options = null; let correct = '';
    if(type==='mcq'){
      const res = collectOptionsFrom(blank.querySelector('.opts'));
      options = res.options;
      correct = res.correct;
      if(options.length===0){ showAlert('Добавьте хотя бы один вариант', 'error'); return; }
    } else {
      correct = (blank.querySelector('.q-correct-text').value||'').trim();
      if(!text){ showAlert('Введите текст вопроса', 'error'); return; }
    }
    const payload = { ordinal: (qs.length+1), text, options, correct, points };
    if(Array.isArray(payload.options) && payload.options.length===0){ payload.options = null; }
    const r = await adminFetch('/api/admin/tests/'+currentTestId+'/questions',{ method:'POST', headers: aHeaders(), body: JSON.stringify(payload) });
    if(!r.ok){ try{ const msg = await r.text(); }catch(e){} showAlert('Ошибка сохранения вопроса', 'error'); return; }
    renderQuestions(currentTestId);
  }

  function renderCard(q){
    const card = document.createElement('div');
    card.className = 'card p-3';
    card.draggable = true;
    card.dataset.qid = q.id;
    card.innerHTML = `
      <div class="d-flex align-items-center" style="gap:4px">
        <span class="drag-handle" title="Перетащить" style="cursor:grab">≡</span>
        <span class="text-muted">#${q.ordinal}</span>
        <select class="admin-input q-type" style="width:220px">
          <option value="mcq" ${Array.isArray(q.options)?'selected':''}>Закрытый (варианты)</option>
          <option value="text" ${Array.isArray(q.options)?'':'selected'}>Открытый</option>
        </select>
        <div style="margin-left:auto; display:flex; gap:6px">
          <button class="admin-button secondary q-dup">Дублировать</button>
          <button class="admin-button danger q-del">Удалить</button>
        </div>
      </div>
      <div class="mt-2">
        <textarea class="admin-input q-text" rows="2" placeholder="Вопрос">${esc(q.text||'')}</textarea>
      </div>
      <div class="q-options mt-2" ${Array.isArray(q.options)?'':'style=\"display:none\"'}>
        <div class="opts"></div>
        <div class="d-flex align-items-center mt-1" style="gap:4px">
          <button class="admin-button secondary add-opt">Добавить вариант</button>
          <span class="small-muted">Отметьте кружком правильный вариант</span>
        </div>
      </div>
      <div class="q-answer-text mt-2" ${Array.isArray(q.options)?'style="display:none"':''}>
        <label>Правильный ответ (текст)<input class="admin-input q-correct-text" value="${!Array.isArray(q.options)?esc(q.correct||''):''}"/></label>
      </div>
      <div class="d-flex align-items-center mt-2" style="gap:6px">
        <label>Баллы<input class="admin-input q-points" type="number" value="${q.points||1}" style="width:80px"/></label>
      </div>
    `;
    const optsWrap = card.querySelector('.opts');
    const groupName = 'g'+Math.random().toString(36).slice(2);
    if(Array.isArray(q.options)){
      const corrIdx = /^[0-9]+$/.test(String(q.correct||'')) ? parseInt(q.correct,10) : -1;
      q.options.forEach((o,idx)=> optsWrap.appendChild(createOptionRow(o, groupName, idx===corrIdx)));
      if(q.options.length===0){ optsWrap.appendChild(createOptionRow('', groupName, false)); }
    }
    const typeSel = card.querySelector('.q-type');
    const optBlock = card.querySelector('.q-options');
    const textBlock = card.querySelector('.q-answer-text');
    typeSel.onchange = ()=>{
      const isText = typeSel.value==='text';
      optBlock.style.display = isText ? 'none' : '';
      textBlock.style.display = isText ? '' : 'none';
    };
    card.querySelector('.add-opt').onclick = (e)=>{ e.preventDefault(); optsWrap.appendChild(createOptionRow('', groupName, false)); };
    card.querySelector('.q-del').onclick = async ()=>{ const r=await adminFetch('/api/admin/questions/'+q.id,{ method:'DELETE', headers:aHeaders() }); if(!r.ok){ showAlert('Ошибка удаления', 'error'); return; } renderQuestions(currentTestId); };
    card.querySelector('.q-dup').onclick = async ()=>{
      const type = typeSel.value;
      const text = card.querySelector('.q-text').value.trim();
      const points = parseInt(card.querySelector('.q-points').value||'1',10)||1;
      let options = null; let correct = '';
      if(type==='mcq'){
        const res = collectOptionsFrom(optsWrap);
        options = res.options;
        correct = res.correct;
      } else {
        correct = (card.querySelector('.q-correct-text').value||'').trim();
      }
      const payload = { ordinal: qs.length+1, text, options, correct, points };
      const r = await adminFetch('/api/admin/tests/'+currentTestId+'/questions',{ method:'POST', headers:aHeaders(), body: JSON.stringify(payload) });
      if(!r.ok){ showAlert('Ошибка дублирования', 'error'); return; }
      renderQuestions(currentTestId);
    };

    // Drag & drop reorder
    card.addEventListener('dragstart', (e)=>{ card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    card.addEventListener('dragend', async ()=>{
      card.classList.remove('dragging');
      // recompute ordinals
      const items = Array.from(qList.children);
      for (let i=0;i<items.length;i++){
        const id = items[i].dataset.qid;
        const newOrd = i+1;
        const qq = qs.find(x=> String(x.id)===String(id));
        if(qq && qq.ordinal !== newOrd){
          try{ await adminFetch('/api/admin/questions/'+id,{ method:'PUT', headers:aHeaders(), body: JSON.stringify({ ordinal:newOrd, text: qq.text, options: qq.options, correct: qq.correct, points: qq.points }) }); }catch{}
        }
      }
      renderQuestions(currentTestId);
    });
    qList.addEventListener('dragover', (e)=>{
      e.preventDefault();
      const dragging = qList.querySelector('.dragging');
      const siblings = Array.from(qList.querySelectorAll('.card:not(.dragging)'));
      const nextSibling = siblings.find(sib=> e.clientY <= sib.getBoundingClientRect().top + sib.offsetHeight/2);
      qList.insertBefore(dragging, nextSibling||null);
    });

    return card;
  }

  function renderBlankCard(){
    const card = document.createElement('div');
    card.className = 'card p-3';
    card.innerHTML = `
      <div class="d-flex align-items-center" style="gap:4px">
        <span class="text-muted">Новый вопрос</span>

          <span class="small-muted">Отметьте кружком правильный вариант</span>
        </div>
      </div>
      <div class="q-answer-text mt-2" style="display:none">
        <label>Правильный ответ (текст)<input class="admin-input q-correct-text"/></label>
      </div>
      <div class="d-flex align-items-center mt-2" style="gap:6px">
        <label>Баллы<input class="admin-input q-points" type="number" value="1" style="width:80px"/></label>
      </div>
      <div class="mt-2 d-flex" style="gap:4px">
        <button class="admin-button success q-create">Добавить</button>
        <button class="admin-button secondary q-cancel">Отмена</button>
      </div>
    `;
    const typeSel = card.querySelector('.q-type');
    const optBlock = card.querySelector('.q-options');
    const textBlock = card.querySelector('.q-answer-text');
    typeSel.onchange = ()=>{
      const isText = typeSel.value==='text';
      optBlock.style.display = isText ? 'none' : '';
      textBlock.style.display = isText ? '' : 'none';
    };
    const optsWrap = card.querySelector('.opts');
    const groupName = 'g'+Math.random().toString(36).slice(2);
    const addOptBtn = card.querySelector('.add-opt');
    addOptBtn.onclick = (e)=>{ e.preventDefault(); optsWrap.appendChild(createOptionRow('', groupName, false)); };
    // initial two options
    optsWrap.appendChild(createOptionRow('', groupName, false));
    optsWrap.appendChild(createOptionRow('', groupName, false));

    card.querySelector('.q-create').onclick = ()=> saveNewQuestion(card);
    card.querySelector('.q-cancel').onclick = ()=> card.remove();
    return card;
  }

  // Render list
  qs.sort((a,b)=> a.ordinal-b.ordinal).forEach(q=> qList.appendChild(renderCard(q)));

  document.getElementById('addBlank').onclick = ()=>{
    const blank = renderBlankCard();
    qList.appendChild(blank);
    blank.scrollIntoView({ behavior:'smooth', block:'center' });
  };
}

// Helpers
function val(id){ return (document.getElementById(id).value||'').trim(); }
function num(id){ return parseInt(val(id)||'0',10)||0; }
function esc(s){ return String(s||'').replace(/[&<>"]/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }

// Homepage Blocks Tab
async function renderHomepage(){
  setActiveTab(document.getElementById('tabHomepage'));
  showLoading('Загрузка блоков главной страницы...');
  try {
    const res = await adminFetch('/api/admin/homepage-blocks', { headers: aHeaders() });
    if (!res.ok) { showAlert('Ошибка загрузки блоков', 'error'); return; }
    const blocks = await res.json();
    
    // Default blocks if empty
    const defaultBlocks = {
      team_composition: { block_key: 'team_composition', title_ru: 'О составе команды', title_ky: 'Топтун курамы жөнүндө', content_ru: '2–4 человека из одной школы', content_ky: 'Бир мектептен 2–4 киши' }
    };
    
    const allBlocks = {};
    blocks.forEach(b => { allBlocks[b.block_key] = b; });
    
    // Merge with defaults
    Object.keys(defaultBlocks).forEach(key => {
      if (!allBlocks[key]) {
        allBlocks[key] = defaultBlocks[key];
      }
    });
    
    content.innerHTML = `
      <div class="admin-form">
        <h3>🏠 Редактирование блоков главной страницы</h3>
        ${Object.values(allBlocks).map(b => `
          <div style="border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px;">
            <h4 style="margin-bottom: 12px;">Блок: ${esc(b.block_key)}</h4>
            <div class="form-row">
              <label>Заголовок (RU)<input id="block_${b.block_key}_title_ru" class="admin-input" value="${esc(b.title_ru || '')}"/></label>
              <label>Заголовок (KY)<input id="block_${b.block_key}_title_ky" class="admin-input" value="${esc(b.title_ky || '')}"/></label>
            </div>
            <div class="form-row">
              <label>Содержимое (RU)<textarea id="block_${b.block_key}_content_ru" class="admin-input" rows="3" style="resize:vertical;">${esc(b.content_ru || '')}</textarea></label>
              <label>Содержимое (KY)<textarea id="block_${b.block_key}_content_ky" class="admin-input" rows="3" style="resize:vertical;">${esc(b.content_ky || '')}</textarea></label>
            </div>
            <button class="admin-button success" onclick="saveBlock('${b.block_key}')" style="margin-top: 8px;">💾 Сохранить блок</button>
          </div>
        `).join('')}
      </div>
    `;
  } catch (e) {
    showAlert('Ошибка: ' + e.message, 'error');
  }
}

async function saveBlock(key) {
  try {
    const title_ru = val(`block_${key}_title_ru`);
    const title_ky = val(`block_${key}_title_ky`);
    const content_ru = val(`block_${key}_content_ru`);
    const content_ky = val(`block_${key}_content_ky`);
    
    const res = await adminFetch(`/api/admin/homepage-blocks/${key}`, {
      method: 'PUT',
      headers: aHeaders(),
      body: JSON.stringify({ title_ru, title_ky, content_ru, content_ky })
    });
    
    if (!res.ok) {
      showAlert('Ошибка сохранения блока', 'error');
      return;
    }
    
    showAlert('Блок успешно сохранен!', 'success');
  } catch (e) {
    showAlert('Ошибка: ' + e.message, 'error');
  }
}

// Tab bindings
const bTests = document.getElementById('tabTests');
const bQuestions = document.getElementById('tabQuestions');
const bCats = document.getElementById('tabCategories');
const bTeams = document.getElementById('tabTeams');
const bResults = document.getElementById('tabResults');
const bSettings = document.getElementById('tabSettings');
const bHomepage = document.getElementById('tabHomepage');

bTests.onclick = renderTests;
bQuestions.onclick = ()=> renderQuestions(null);
bCats.onclick = renderCategories;
bTeams.onclick = renderTeams;
bResults.onclick = renderResults;
bSettings.onclick = renderSettings;
bHomepage.onclick = renderHomepage;

// default
renderTests();
</script>
</body></html>
