
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Кабинет команды - Akylman Quiz Bowl">
  <title data-i18n="team.title">Кабинет команды</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
</head>
<body class="admin-panel">
<div class="container">
  <div class="lang-switch text-end" role="group" aria-label="Выбор языка">
    <button data-lang="ru" aria-label="Русский язык" aria-pressed="true">РУ</button> 
    <button data-lang="ky" aria-label="Кыргызский язык" aria-pressed="false">КЫ</button>
  </div>
  <a href="/" aria-label="Главная страница"><img src="../images/image.png" class="logo-center img-fluid" alt="Akylman Quiz Bowl" width="120" height="48"/></a>
  <nav class="topbar d-flex justify-content-end gap-2 flex-wrap" aria-label="Основная навигация">
    <a class="nav-btn" href="/" data-i18n="nav.home" aria-label="Перейти на главную страницу">Главная</a>
    <button class="link-pill" id="logout" data-i18n="nav.logout" aria-label="Выйти из аккаунта" type="button">Выход</button>
  </nav>
  <main class="team-page-main" role="main">
    <h1 data-i18n="team.title" class="sr-only">Кабинет команды</h1>
    <h2 data-i18n="team.title" class="visually-hidden">Кабинет команды</h2>
    <div class="team-layout">
      <nav class="team-tabs" role="tablist" aria-label="Навигация по разделам">
        <h2 id="teamNameHeader" class="team-name-header">Загрузка...</h2>
        <button id="tabHome" class="tab-btn active" role="tab" aria-selected="true" aria-controls="tabContent" data-section="main" data-i18n="team.tab.home" tabindex="0">Главная</button> 
        <button id="tabTests" class="tab-btn" role="tab" aria-selected="false" aria-controls="tabContent" data-section="tests" data-i18n="team.tab.tests" tabindex="-1">Тесты</button> 
        <button id="tabResults" class="tab-btn" role="tab" aria-selected="false" aria-controls="tabContent" data-section="results" data-i18n="team.tab.results" tabindex="-1">Результаты</button> 
        <button id="tabPractice" class="tab-btn" role="tab" aria-selected="false" aria-controls="tabContent" data-section="practice" data-i18n="team.tab.practice" tabindex="-1">Практика</button> 
        <button id="tabRules" class="tab-btn" role="tab" aria-selected="false" aria-controls="tabContent" data-section="rules" data-i18n="team.tab.rules" tabindex="-1">Правила</button>
      </nav>
      <div id="tabContent" class="team-main" role="tabpanel" aria-labelledby="tabHome" aria-live="polite"></div>
    </div>
  </main>
</div>

<!-- Password Change Modal -->
<div id="passwordChangeModal" class="reset-modal" style="display: none;">
  <div class="reset-modal-content">
    <div class="reset-modal-header">
      <h3>Изменение пароля</h3>
      <button class="reset-close-btn" onclick="closePasswordChangeModal(event)" aria-label="Закрыть">×</button>
    </div>
    
    <div id="passwordStep1" class="reset-step">
      <p class="reset-description">Введите текущий пароль:</p>
      <div class="form-row">
        <label>
          <span>Текущий пароль</span>
          <input type="password" id="passwordOldPassword" placeholder="Введите текущий пароль" required autocomplete="current-password"/>
        </label>
      </div>
      <div id="passwordStep1Message" class="reset-message" style="display: none;"></div>
      <div class="reset-actions">
        <button class="primary" onclick="verifyOldPassword()" id="verifyOldPasswordBtn">Проверить</button>
        <button class="nav-btn" onclick="closePasswordChangeModal(event)">Отмена</button>
      </div>
    </div>
    
    <div id="passwordStep2" class="reset-step" style="display: none;">
      <p class="reset-description">Введите новый пароль:</p>
      <div class="form-row">
        <label>
          <span>Новый пароль</span>
          <input type="password" id="passwordNewPassword" placeholder="Введите новый пароль" required autocomplete="new-password"/>
        </label>
      </div>
      <div class="form-row">
        <label>
          <span>Повторите новый пароль</span>
          <input type="password" id="passwordConfirmPassword" placeholder="Повторите новый пароль" required autocomplete="new-password"/>
        </label>
      </div>
      <div class="password-requirements" id="passwordChangeReqs" style="margin-top: 12px;">
        <div class="requirement" id="pwd-req-length"><span>8 символов</span></div>
        <div class="requirement" id="pwd-req-upper"><span>Заглавная буква</span></div>
        <div class="requirement" id="pwd-req-lower"><span>Строчная буква</span></div>
        <div class="requirement" id="pwd-req-number"><span>Цифра</span></div>
      </div>
      <div id="passwordStep2Message" class="reset-message" style="display: none;"></div>
      <div class="reset-actions">
        <button class="primary" onclick="changePassword()" id="changePasswordBtn" data-i18n="team.change_password">Изменить пароль</button>
        <button class="nav-btn" onclick="goBackToPasswordStep1()">Назад</button>
      </div>
    </div>
  </div>
</div>

<!-- Field Edit Modal -->
<div id="fieldEditModal" class="reset-modal" style="display: none;">
  <div class="reset-modal-content" style="max-width: 500px;">
    <div class="reset-modal-header">
      <h3 id="fieldEditTitle">Редактирование</h3>
      <button class="reset-close-btn" onclick="closeFieldEditModal(event)" aria-label="Закрыть">×</button>
    </div>
    
    <div class="reset-step">
      <p class="reset-description" id="fieldEditDescription">Введите новое значение:</p>
      <div class="form-row">
        <label>
          <span id="fieldEditLabel">Значение</span>
          <input type="text" id="fieldEditInput" placeholder="" style="width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 15px;"/>
        </label>
      </div>
      <div id="fieldEditMessage" class="reset-message" style="display: none;"></div>
      <div class="reset-actions">
        <button class="primary" onclick="saveFieldEdit()" id="saveFieldBtn" data-i18n="team.save">Сохранить</button>
        <button class="nav-btn" onclick="closeFieldEditModal(event)" data-i18n="team.cancel">Отмена</button>
      </div>
    </div>
  </div>
</div>

<!-- Members Edit Modal -->
<div id="membersEditModal" class="reset-modal" style="display: none;">
  <div class="reset-modal-content" style="max-width: 600px;">
    <div class="reset-modal-header">
      <h3 data-i18n="team.edit_members">Редактирование участников</h3>
      <button class="reset-close-btn" onclick="closeMembersEditModal(event)" aria-label="Закрыть">×</button>
    </div>
    
    <div class="reset-step">
      <p class="reset-description" data-i18n="team.edit_members_description">Добавьте или измените участников команды:</p>
      <div id="membersEditList" style="margin-bottom: 16px;">
        <!-- Список участников будет добавлен динамически -->
      </div>
      <button type="button" class="nav-btn" onclick="addMemberRow()" style="margin-bottom: 16px;" data-i18n="team.add_member">+ Добавить участника</button>
      <div id="membersEditMessage" class="reset-message" style="display: none;"></div>
      <div class="reset-actions">
        <button class="primary" onclick="saveMembers()" id="saveMembersBtn" data-i18n="team.save">Сохранить</button>
        <button class="nav-btn" onclick="closeMembersEditModal(event)" data-i18n="team.cancel">Отмена</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="../js/i18n.js"></script>
<script>AkylI18n.initSwitcher();</script>
<script>
// Token is now handled via httpOnly cookies — no localStorage needed
let teamData = null;

// Функция для получения переводов
function t(key) {
  if (typeof AkylI18n !== 'undefined' && AkylI18n.t) {
    return AkylI18n.t(key);
  }
  return key;
}

function updateTeamNameHeader() {
  const teamNameHeader = document.getElementById('teamNameHeader');
  if (teamNameHeader && teamData) {
    teamNameHeader.textContent = teamData.team_name || 'Команда';
  }
}

async function load() {
  const res = await fetch('/api/me', { credentials: 'include' });
  const j = await res.json();
  if (!j.ok) {
    location.href = '/login';
    return;
  }
  teamData = j.team;
  updateTeamNameHeader();
}

load();

document.getElementById('logout').onclick = async () => {
  try {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
  } catch {}
  location.href = '/';
};

function setActiveTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
    b.setAttribute('tabindex', '-1');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');
  btn.setAttribute('tabindex', '0');
  document.getElementById('tabContent').setAttribute('aria-labelledby', btn.id);
}

async function renderHomeSection(btn) {
  if (btn) setActiveTab(btn);
  const out = document.getElementById('tabContent');
  out.setAttribute('aria-busy', 'true');
  out.innerHTML = '<div class="loading-spinner" role="status" aria-live="polite"><span class="sr-only">Загрузка...</span></div><p data-i18n="team.loading">Загрузка...</p>';
  AkylI18n.applyI18n(AkylI18n.getLang(), out);
  
  // Если данные еще не загружены, загружаем их
  if (!teamData) {
    try {
      const res = await fetch('/api/me', { credentials: 'include' });
      const j = await res.json();
      if (j.ok) {
        teamData = j.team;
        updateTeamNameHeader();
      }
    } catch (err) {
      console.error(err);
      out.setAttribute('aria-busy', 'false');
      out.innerHTML = '<div class="error-message" role="alert"><p style="color: var(--danger);">Ошибка загрузки данных. Пожалуйста, обновите страницу.</p></div>';
      return;
    }
  }
  
  out.setAttribute('aria-busy', 'false');
  
  if (teamData) {
    const lang = AkylI18n.getLang();
    let categoryLabel = '';
    if (teamData.category_name_ru || teamData.category_name_ky) {
      categoryLabel = lang === 'ky'
        ? (teamData.category_name_ky || teamData.category_name_ru || '')
        : (teamData.category_name_ru || teamData.category_name_ky || '');
    } else if (teamData.category_id) {
      categoryLabel = 'ID: ' + teamData.category_id;
    }
    
    // Получаем участников команды
    let membersHtml = '';
    if (teamData.members && teamData.members.length > 0) {
      membersHtml = teamData.members.map((m) => {
        const name = escapeHtml(m?.name || 'Участник');
        const cls = m?.class ? ` <span class="member-class">— ${escapeHtml(m.class)}</span>` : '';
        return `<li><span class="member-name">${name}</span>${cls}</li>`;
      }).join('');
    } else {
      membersHtml = '<li class="empty-state">Участники не указаны</li>';
    }
    
    out.innerHTML = `
      <section aria-labelledby="welcome-heading">
        <h3 id="welcome-heading" data-i18n="team.welcome">Кабинет команды</h3>
        <div class="team-info" role="region" aria-label="Информация о команде">
          <dl class="info-list">
            <div class="info-item editable" data-field="team_name">
              <dt data-i18n="team.team_name">Название команды:</dt>
              <dd>
                <span class="info-value">${escapeHtml(teamData.team_name || '')}</span>
                <button type="button" class="inline-edit-btn" data-field="team_name" data-i18n="team.edit">Изменить</button>
              </dd>
            </div>
            <div class="info-item">
              <dt data-i18n="team.category">Категория:</dt>
              <dd>
                <span class="info-value">${categoryLabel ? escapeHtml(categoryLabel) : 'Не выбрана'}</span>
              </dd>
            </div>
            <div class="info-item editable" data-field="captain_name">
              <dt data-i18n="team.captain">Капитан:</dt>
              <dd>
                <span class="info-value">${escapeHtml(teamData.captain_name || '')}</span>
                <button type="button" class="inline-edit-btn" data-field="captain_name" data-i18n="team.edit">Изменить</button>
              </dd>
            </div>
            ${teamData.captain_phone ? `
            <div class="info-item editable" data-field="captain_phone">
              <dt data-i18n="team.phone">Телефон:</dt>
              <dd>
                <span class="info-value"><a href="tel:${escapeHtml(teamData.captain_phone)}" aria-label="Позвонить капитану">${escapeHtml(teamData.captain_phone)}</a></span>
                <button type="button" class="inline-edit-btn" data-field="captain_phone" data-i18n="team.edit">Изменить</button>
              </dd>
            </div>
            ` : `
            <div class="info-item editable" data-field="captain_phone">
              <dt data-i18n="team.phone">Телефон:</dt>
              <dd>
                <span class="info-value small-muted">Не указан</span>
                <button type="button" class="inline-edit-btn" data-field="captain_phone" data-i18n="team.edit">Изменить</button>
              </dd>
            </div>
            `}
            ${teamData.school ? `
            <div class="info-item editable" data-field="school">
              <dt data-i18n="team.school">Школа:</dt>
              <dd>
                <span class="info-value">${escapeHtml(teamData.school)}</span>
                <button type="button" class="inline-edit-btn" data-field="school" data-i18n="team.edit">Изменить</button>
              </dd>
            </div>
            ` : `
            <div class="info-item editable" data-field="school">
              <dt data-i18n="team.school">Школа:</dt>
              <dd>
                <span class="info-value small-muted">Не указана</span>
                <button type="button" class="inline-edit-btn" data-field="school" data-i18n="team.edit">Изменить</button>
              </dd>
            </div>
            `}
            ${teamData.city ? `
            <div class="info-item editable" data-field="city">
              <dt data-i18n="team.city">Город:</dt>
              <dd>
                <span class="info-value">${escapeHtml(teamData.city)}</span>
                <button type="button" class="inline-edit-btn" data-field="city" data-i18n="team.edit">Изменить</button>
              </dd>
            </div>
            ` : `
            <div class="info-item editable" data-field="city">
              <dt data-i18n="team.city">Город:</dt>
              <dd>
                <span class="info-value small-muted">Не указан</span>
                <button type="button" class="inline-edit-btn" data-field="city" data-i18n="team.edit">Изменить</button>
              </dd>
            </div>
            `}
          </dl>

          <section aria-labelledby="members-heading">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
              <h4 id="members-heading" data-i18n="team.members" style="margin: 0;">Участники команды:</h4>
              <button type="button" class="inline-edit-btn" onclick="handleMembersEdit(event)" data-i18n="team.edit">Изменить</button>
            </div>
            <ul class="members-list" role="list">
              ${membersHtml}
            </ul>
          </section>

          <section class="account-section" aria-labelledby="account-heading">
            <h4 id="account-heading">Аккаунт</h4>
            <dl class="info-list">
              ${teamData.captain_email ? `
              <div class="info-item">
                <dt data-i18n="team.email">Email капитана:</dt>
                <dd><a href="mailto:${escapeHtml(teamData.captain_email)}" aria-label="Отправить email капитану">${escapeHtml(teamData.captain_email)}</a></dd>
              </div>
              ` : ''}
              <div class="info-item">
                <dt>Пароль:</dt>
                <dd>
                  <span class="info-value">••••••••</span>
                  <button type="button" class="inline-edit-btn" data-field="password" data-i18n="team.edit">Изменить</button>
                </dd>
              </div>
            </dl>
          </section>
        </div>
      </section>
    `;

    // Навесить обработчики на кнопки "Изменить"
    out.querySelectorAll('.inline-edit-btn').forEach(btn => {
      // Пропускаем кнопки, которые уже имеют onclick (например, для участников)
      if (btn.hasAttribute('onclick')) {
        return;
      }
      const field = btn.getAttribute('data-field');
      if (field === 'password') {
        btn.addEventListener('click', handlePasswordChange);
      } else if (field) {
        btn.addEventListener('click', () => handleInlineEdit(field));
      }
    });
  } else {
    out.innerHTML = '<div class="empty-state" role="status"><p data-i18n="team.loading">Загрузка...</p></div>';
  }
  
  AkylI18n.applyI18n(AkylI18n.getLang(), out);
}

// Функция для экранирования HTML
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderRulesSection(btn) {
  if (btn) setActiveTab(btn);
  const out = document.getElementById('tabContent');
  out.innerHTML = `
    <section aria-labelledby="rules-heading">
      <h3 id="rules-heading" data-i18n="team.tab.rules">Правила</h3>
      <p data-i18n="team.rules.hidden_note">Правила доступны здесь.</p>
      <div class="iframe-wrapper">
        <iframe 
          src="../pages/rules.pdf" 
          title="Правила соревнования"
          aria-label="Документ с правилами соревнования"
          style="width:100%;height:480px;border:1px solid #eef4fb;border-radius:10px">
        </iframe>
      </div>
    </section>
  `;
  AkylI18n.applyI18n(AkylI18n.getLang(), out);
}

function renderPracticeSection(btn) {
  if (btn) setActiveTab(btn);
  const out = document.getElementById('tabContent');
  out.innerHTML = `
    <section aria-labelledby="practice-heading">
      <h3 id="practice-heading" data-i18n="team.tab.practice">Практика</h3>
      <div class="practice-content" role="region" aria-label="Примеры вопросов для практики">
        <div class="practice-section">
          <h4>Кыргызстан таануу — үлгү суроолор</h4>
          <ol class="practice-list">
            <li>Кыргызстандын борбору кайсы? — <strong>Бишкек</strong></li>
            <li>Ысык-Көл кайсы дубанда жайгашкан? — <strong>Ысык-Көл облусу</strong></li>
            <li>Кыргызстандын мамлекеттик тили? — <strong>Кыргыз тили</strong></li>
          </ol>
        </div>
        <div class="practice-section">
          <h4>Адабият — үлгү суроолор</h4>
          <ol class="practice-list">
            <li>«Манас» эпосунун башкы каарманы ким? — <strong>Манас</strong></li>
            <li>А. Пушкиндин кайсы чыгармасында Татьяна бар? — <strong>Евгений Онегин</strong></li>
            <li>«Ысык-Көлдүн кулагы» чыгарма кайсы жанрда? — <strong>Повесть/эссе (контексттик кабыл)</strong></li>
          </ol>
        </div>
        <p class="small-muted practice-note">Бул үлгүлөр формат менен тааныштыруу үчүн гана.</p>
      </div>
    </section>
  `;
  AkylI18n.applyI18n(AkylI18n.getLang(), out);
}

async function renderTestsSection(btn) {
  if (btn) setActiveTab(btn);
  const out = document.getElementById('tabContent');
  out.setAttribute('aria-busy', 'true');
  out.innerHTML = '<div class="loading-spinner" role="status" aria-live="polite"><span class="sr-only">Загрузка тестов...</span></div><p data-i18n="team.loading">Загрузка...</p>';
  AkylI18n.applyI18n(AkylI18n.getLang(), out);
  
  try {
    let url = '/api/tests';
    if (teamData && teamData.category_id) {
      url += `?category_id=${encodeURIComponent(teamData.category_id)}`;
    }
    const res = await fetch(url);
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }
    const tests = await res.json();
    out.setAttribute('aria-busy', 'false');
    
    if (!tests.length) {
      out.innerHTML = `
        <div class="empty-state" role="status" aria-live="polite">
          <div class="empty-icon">📝</div>
          <p data-i18n="team.no_tests" class="empty-message">Нет тестов</p>
          <p class="empty-hint">Тесты появятся здесь, когда они будут доступны.</p>
        </div>
      `;
      AkylI18n.applyI18n(AkylI18n.getLang(), out);
      return;
    }
    
    function renderWindow(t) {
      if (t.window_start && t.window_end) {
        return `<span class="test-window" aria-label="Период доступности теста">(${t.window_start} → ${t.window_end})</span>`;
      }
      return '';
    }
    
    out.innerHTML = `
      <section aria-labelledby="tests-heading">
        <h3 id="tests-heading" class="sr-only" data-i18n="team.tab.tests">Тесты</h3>
        <ul class="test-list" role="list" aria-label="Список доступных тестов">
          ${tests.map((t, idx) => `
            <li role="listitem" class="test-card">
              <div class="test-card-header">
                <h4 class="test-title">${escapeHtml(t.title || 'Без названия')}</h4>
                ${renderWindow(t)}
              </div>
              ${t.description ? `<p class="test-description">${escapeHtml(t.description)}</p>` : ''}
              <button 
                data-id="${t.id}" 
                class="take primary" 
                data-i18n="team.take_test"
                aria-label="Начать тест: ${escapeHtml(t.title || 'Без названия')}"
                type="button">
                Пройти
              </button>
            </li>
          `).join('')}
        </ul>
      </section>
    `;
    
    AkylI18n.applyI18n(AkylI18n.getLang(), out);
    
    document.querySelectorAll('.take').forEach(b => {
      b.onclick = () => startTest(b.dataset.id);
      b.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          b.click();
        }
      });
    });
  } catch (err) {
    console.error(err);
    out.setAttribute('aria-busy', 'false');
    out.innerHTML = `
      <div class="error-message" role="alert" aria-live="assertive">

async function startTest(id) {
  const out = document.getElementById('tabContent');
  out.innerHTML = t('team.loading_questions');
  AkylI18n.applyI18n(AkylI18n.getLang(), out);
  
  try {
    const res = await fetch('/api/tests/' + id);
    if (res.status === 403) {
      out.innerHTML = `<p data-i18n="team.test_unavailable">Тест сейчас недоступен</p>`;
      AkylI18n.applyI18n(AkylI18n.getLang(), out);
      return;
    }
    
    const qs = await res.json();
    if (!qs.length) {
      out.innerHTML = `<p data-i18n="team.empty_test">Пустой тест</p>`;
      AkylI18n.applyI18n(AkylI18n.getLang(), out);
      return;
    }

    // Получаем метаданные конкретного теста
    const testMetaRes = await fetch('/api/tests');
    const allTests = await testMetaRes.json();
    const testMeta = allTests.find(x => String(x.id) === String(id));
    const durMins = (testMeta && testMeta.duration_minutes) ? testMeta.duration_minutes : 60;
    let remainingSec = durMins * 60;

    const timerDiv = document.createElement('div');
    timerDiv.className = 'test-timer';

    const interval = setInterval(() => {
      remainingSec--;
      timerDiv.textContent = `${t('team.timer')}: ` + fmt(remainingSec);
      if (remainingSec <= 0) {
        clearInterval(interval);
        finish();
      }
    }, 1000);
    
    let idx = 0;
    const answers = {};
    
    function show() {
      const q = qs[idx];
      out.innerHTML = '';
    out.appendChild(timerDiv);
    const block = document.createElement('div');
      block.innerHTML = `
        <div class="question-block" role="region" aria-labelledby="question-number">
          <div class="question-header">
            <h4 id="question-number" class="question-number">Вопрос ${idx + 1} из ${qs.length}</h4>
            <div class="question-progress" role="progressbar" aria-valuenow="${idx + 1}" aria-valuemin="1" aria-valuemax="${qs.length}" aria-label="Прогресс: вопрос ${idx + 1} из ${qs.length}">
              <div class="progress-bar" style="width: ${((idx + 1) / qs.length) * 100}%"></div>
            </div>
          </div>
          <p class="question-text" id="question-text-${idx}">${escapeHtml(q.text)}</p>
          <fieldset class="question-options" role="radiogroup" aria-labelledby="question-text-${idx}">
            ${q.options && q.options.length ? q.options.map((o, i) => `
              <div class="option-item">
                <label>
                  <input 
                    type="radio" 
                    name="opt" 
                    value="${i}" 
                    id="opt-${idx}-${i}"
                    aria-describedby="question-text-${idx}"
                    ${answers[q.id] === String(i) ? 'checked' : ''}
                  />
                  <span>${escapeHtml(o)}</span>
                </label>
              </div>
            `).join('') : `
              <div class="text-answer">
                <label for="txt-${idx}" class="sr-only">Введите ваш ответ</label>
                <input 
                  id="txt-${idx}" 
                  type="text" 
                  placeholder="Введите ответ"
                  aria-labelledby="question-text-${idx}"
                  value="${answers[q.id] || ''}"
                />
              </div>
            `}
          </fieldset>
        </div>
        <nav class="test-navigation" aria-label="Навигация по вопросам">
          <button 
            id="prev" 
            class="nav-btn" 
            ${idx === 0 ? 'disabled aria-disabled="true"' : ''}
            aria-label="Предыдущий вопрос"
            type="button">
            ${t('team.prev')}
          </button>
          <button 
            id="next" 
            class="primary"
            aria-label="${idx >= qs.length - 1 ? 'Завершить тест' : 'Следующий вопрос'}"
            type="button">
            ${idx >= qs.length - 1 ? t('team.done') : t('team.next')}
          </button>
        </nav>
      `;
    out.appendChild(block);
      
      // Восстанавливаем сохраненный ответ
      if (q.options && q.options.length) {
        const savedAnswer = answers[q.id];
        if (savedAnswer !== null && savedAnswer !== undefined) {
          const radio = document.getElementById(`opt-${idx}-${savedAnswer}`);
          if (radio) radio.checked = true;
        }
      } else {
        const textInput = document.getElementById(`txt-${idx}`);
        if (textInput) {
          textInput.value = answers[q.id] || '';
        }
      }
      
      if (idx > 0) {
        document.getElementById('prev').onclick = () => {
          // Сохраняем текущий ответ перед переходом
          if (q.options && q.options.length) {
            const sel = document.querySelector('input[name="opt"]:checked');
            answers[q.id] = sel ? sel.value : null;
          } else {
            const textInput = document.getElementById(`txt-${idx}`);
            answers[q.id] = textInput ? textInput.value : '';
          }
          if (idx > 0) {
            idx--;
            show();
          }
        };
      }
      
      document.getElementById('next').onclick = () => {
        // Сохраняем текущий ответ
        if (q.options && q.options.length) {
          const sel = document.querySelector('input[name="opt"]:checked');
          answers[q.id] = sel ? sel.value : null;
        } else {
          const textInput = document.getElementById(`txt-${idx}`);
          answers[q.id] = textInput ? textInput.value : '';
        }
        idx++;
        if (idx >= qs.length) {
          finish();
        } else {
          show();
        }
      };
      
      // Автосохранение при изменении ответа
      if (q.options && q.options.length) {
        document.querySelectorAll('input[name="opt"]').forEach(radio => {
          radio.addEventListener('change', () => {
            answers[q.id] = radio.value;
          });
        });
      } else {
        const textInput = document.getElementById(`txt-${idx}`);
        if (textInput) {
          textInput.addEventListener('input', () => {
            answers[q.id] = textInput.value;
          });
        }
      }
    }
    
    async function finish() {
      out.innerHTML = t('team.submitting');
      clearInterval(interval);
      
      try {
        const resp = await fetch('/api/tests/' + id + '/submit', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({ answers })
        });
        const j = await resp.json();
        if (!j.ok) {
          out.innerHTML = `<p style="color: var(--danger);" data-i18n="team.error">Ошибка</p>`;
          AkylI18n.applyI18n(AkylI18n.getLang(), out);
          return;
        }
        // Используем данные, возвращённые сервером
        const totalQuestions = typeof j.total === 'number' ? j.total : qs.length;
        const maxScore = typeof j.maxScore === 'number' ? j.maxScore : totalQuestions;
        const rawScore = typeof j.score === 'number' ? j.score : 0;
        const correctCount = typeof j.correct === 'number' ? j.correct : rawScore;
        const percentage = maxScore > 0 ? Math.round((rawScore / maxScore) * 100) : 0;
        out.innerHTML = `
          <div class="test-result" role="region" aria-live="polite" aria-label="Результат теста">
            <div class="result-icon" aria-hidden="true">${percentage >= 70 ? '🎉' : percentage >= 50 ? '👍' : '📝'}</div>
            <h3 data-i18n="team.done">Готово</h3>
            <div class="result-score">
              <p class="result-label">Ваш результат:</p>
              <p class="result-value"><strong>${correctCount}</strong> <span class="result-max">из ${totalQuestions}</span></p>
              <div class="result-percentage" aria-label="Процент правильных ответов: ${percentage}%">
                <div class="percentage-bar">
                  <div class="percentage-fill" style="width: ${percentage}%"></div>
                </div>
                <span class="percentage-text">${percentage}%</span>
              </div>
            </div>
            <div class="result-actions">
              <button class="primary" onclick="document.getElementById('tabResults').click()" type="button">
                Посмотреть все результаты
              </button>
              <button class="nav-btn" onclick="document.getElementById('tabTests').click()" type="button">
                Вернуться к тестам
              </button>
            </div>
          </div>
        `;
        AkylI18n.applyI18n(AkylI18n.getLang(), out);
      } catch (err) {
        console.error(err);
        out.innerHTML = `<p style="color: var(--danger);" data-i18n="team.error">Ошибка</p>`;
        AkylI18n.applyI18n(AkylI18n.getLang(), out);
      }
    }
    
    function fmt(s) {
      if (s < 0) s = 0;
      const m = Math.floor(s / 60);
      const ss = String(s % 60).padStart(2, '0');
      return `${m}:${ss}`;
    }
    
    show();
  } catch (err) {
    console.error(err);
    out.innerHTML = '<p style="color: var(--danger);">Ошибка загрузки теста</p>';
  }
}

async function saveFieldEdit() {
  if (!currentEditField || !teamData) return;
  
  const input = document.getElementById('fieldEditInput');
  const newValue = (input?.value || '').trim();
  const messageEl = document.getElementById('fieldEditMessage');
  const btn = document.getElementById('saveFieldBtn');
  
  btn.disabled = true;
  btn.textContent = t('team.saving') || 'Сохранение...';
  
  try {
    const body = {};
    body[currentEditField] = newValue;
    
    const res = await fetch('/api/me', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'include',
      body: JSON.stringify(body)
    });
    
    const j = await res.json();
    
    if (!res.ok || !j.ok) {
      const msg = j && j.error ? j.error : (t('team.save_error') || 'Не удалось сохранить изменения');
      messageEl.textContent = msg;
      messageEl.className = 'reset-message error';
      messageEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = t('team.save') || 'Сохранить';
      return;
    }
    
    teamData = j.team || teamData;
    updateTeamNameHeader();
    
    // Обновляем локальное хранилище team, если оно есть
    try {
      const currentStored = JSON.parse(localStorage.getItem('team') || 'null');
      if (currentStored && Number(currentStored.id) === Number(teamData.id)) {
        localStorage.setItem('team', JSON.stringify({ ...currentStored, ...teamData }));
      }
    } catch {}
    
    // Успешно
    messageEl.textContent = t('team.save_success') || 'Изменения успешно сохранены';
    messageEl.className = 'reset-message success';
    messageEl.style.display = 'block';
    
    setTimeout(() => {
      closeFieldEditModal();
      // Перерисовываем главную секцию
      renderHomeSection(document.getElementById('tabHome'));
    }, 1000);
    
  } catch (err) {
    console.error(err);
    messageEl.textContent = t('team.save_error') || 'Произошла ошибка при сохранении. Попробуйте ещё раз.';
    messageEl.className = 'reset-message error';
    messageEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = t('team.save') || 'Сохранить';
  }
}

// Проверка старого пароля
async function verifyOldPassword() {
  const oldPassword = document.getElementById('passwordOldPassword').value;
  const messageEl = document.getElementById('passwordStep1Message');
  
  if (!oldPassword) {
    messageEl.textContent = 'Введите текущий пароль';
    messageEl.className = 'reset-message error';
    messageEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('verifyOldPasswordBtn');
  btn.disabled = true;
  btn.textContent = 'Проверка...';

  try {
    const res = await fetch('/api/me/verify-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'include',
      body: JSON.stringify({ password: oldPassword })
    });
    const j = await res.json();
    
    if (!res.ok || !j.ok) {
      messageEl.textContent = j && j.error ? j.error : 'Неверный пароль';
      messageEl.className = 'reset-message error';
      messageEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Проверить';
      return;
    }

    // Пароль верный, переходим к шагу 2
    document.getElementById('passwordStep1').style.display = 'none';
    document.getElementById('passwordStep2').style.display = 'block';
    document.getElementById('passwordNewPassword').focus();
    
    // Навешиваем обработчики для проверки требований к паролю
    const newPwdInput = document.getElementById('passwordNewPassword');
    const confirmPwdInput = document.getElementById('passwordConfirmPassword');
    
    newPwdInput.addEventListener('input', checkPasswordRequirements);
    confirmPwdInput.addEventListener('input', checkPasswordMatch);
    
  } catch (err) {
    console.error(err);
    messageEl.textContent = 'Произошла ошибка. Попробуйте ещё раз.';
    messageEl.className = 'reset-message error';
    messageEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Проверить';
  }
}

// Проверка требований к паролю
function checkPasswordRequirements() {
  const password = document.getElementById('passwordNewPassword').value;
  const reqs = {
    length: password.length >= 8,
    upper: /[A-ZА-ЯЁ]/.test(password),
    lower: /[a-zа-яё]/.test(password),
    number: /[0-9]/.test(password)
  };
  
  document.getElementById('pwd-req-length').classList.toggle('met', reqs.length);
  document.getElementById('pwd-req-upper').classList.toggle('met', reqs.upper);
  document.getElementById('pwd-req-lower').classList.toggle('met', reqs.lower);
  document.getElementById('pwd-req-number').classList.toggle('met', reqs.number);
  
  checkPasswordMatch();
}

// Проверка совпадения паролей
function checkPasswordMatch() {
  const newPwd = document.getElementById('passwordNewPassword').value;
  const confirmPwd = document.getElementById('passwordConfirmPassword').value;
  const messageEl = document.getElementById('passwordStep2Message');
  
  if (confirmPwd && newPwd !== confirmPwd) {
    messageEl.textContent = 'Пароли не совпадают';
    messageEl.className = 'reset-message error';
    messageEl.style.display = 'block';
  } else {
    messageEl.style.display = 'none';
  }
}

// Изменение пароля
async function changePassword() {
  const oldPassword = document.getElementById('passwordOldPassword').value;
  const newPassword = document.getElementById('passwordNewPassword').value;
  const confirmPassword = document.getElementById('passwordConfirmPassword').value;
  const messageEl = document.getElementById('passwordStep2Message');
  
  // Проверка требований
  const reqs = {
    length: newPassword.length >= 8,
    upper: /[A-ZА-ЯЁ]/.test(newPassword),
    lower: /[a-zа-яё]/.test(newPassword),
    number: /[0-9]/.test(newPassword)
  };
  
  if (!reqs.length || !reqs.upper || !reqs.lower || !reqs.number) {
    messageEl.textContent = 'Пароль не соответствует требованиям';
    messageEl.className = 'reset-message error';
    messageEl.style.display = 'block';
    return;
  }
  
  if (newPassword !== confirmPassword) {
    messageEl.textContent = 'Пароли не совпадают';
    messageEl.className = 'reset-message error';
    messageEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('changePasswordBtn');
  btn.disabled = true;
  btn.textContent = 'Изменение...';

  try {
    const res = await fetch('/api/me/change-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'include',
      body: JSON.stringify({ oldPassword, newPassword })
    });
    const j = await res.json();
    
    if (!res.ok || !j.ok) {
      const msg = j && j.error ? j.error : 'Не удалось изменить пароль';
      messageEl.textContent = msg;
      messageEl.className = 'reset-message error';
      messageEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = t('team.change_password');
      return;
    }
    
    // Успешно
    messageEl.textContent = 'Пароль успешно изменён';
    messageEl.className = 'reset-message success';
    messageEl.style.display = 'block';
    
    setTimeout(() => {
      closePasswordChangeModal();
    }, 1500);
    
  } catch (err) {
    console.error(err);
    messageEl.textContent = 'Произошла ошибка при изменении пароля. Попробуйте ещё раз.';
    messageEl.className = 'reset-message error';
    messageEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Изменить пароль';
  }
}

// Редактирование участников команды
function handleMembersEdit(event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  
  const modal = document.getElementById('membersEditModal');
  if (!modal || !teamData) {
    console.error('Modal or teamData not found');
    return;
  }
  
  modal.style.display = 'flex';
  const listContainer = document.getElementById('membersEditList');
  if (!listContainer) {
    console.error('membersEditList not found');
    return;
  }

  // Сбрасываем состояние сообщений и кнопки сохранения
  const messageEl = document.getElementById('membersEditMessage');
  const btn = document.getElementById('saveMembersBtn');
  if (messageEl) {
    messageEl.style.display = 'none';
    messageEl.textContent = '';
  }
  if (btn) {
    btn.disabled = false;
    btn.textContent = t('team.save') || 'Сохранить';
  }
  
  listContainer.innerHTML = '';
  
  // Загружаем текущих участников
  const members = teamData.members || [];
  if (Array.isArray(members)) {
    members.forEach((member, index) => {
      addMemberRow(member.name || '', member.class || '', index);
    });
  }
  
  // Если участников нет, добавляем одну пустую строку
  if (members.length === 0) {
    addMemberRow('', '', 0);
  }
  
  if (typeof AkylI18n !== 'undefined' && AkylI18n.applyI18n) {
    AkylI18n.applyI18n(AkylI18n.getLang(), modal);
  }
}

function addMemberRow(name = '', className = '', index = null) {
  const listContainer = document.getElementById('membersEditList');
  if (!listContainer) return;
  
  const rowIndex = index !== null ? index : listContainer.children.length;
  const row = document.createElement('div');
  row.className = 'member-edit-row';
  row.style.cssText = 'display: flex; gap: 8px; margin-bottom: 12px; align-items: flex-start;';
  row.innerHTML = `
    <div style="flex: 1;">
      <label style="display: block; margin-bottom: 4px; font-size: 13px; font-weight: 600;" data-i18n="team.member_name">Имя участника</label>
      <input type="text" class="member-name-input" placeholder="${t('team.member_name') || 'Имя участника'}" value="${escapeHtml(name)}" style="width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;"/>
    </div>
    <div style="flex: 1;">
      <label style="display: block; margin-bottom: 4px; font-size: 13px; font-weight: 600;" data-i18n="team.member_class">Класс</label>
      <input type="text" class="member-class-input" placeholder="${t('team.member_class') || 'Класс'}" value="${escapeHtml(className)}" style="width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;"/>
    </div>
    <button type="button" onclick="removeMemberRow(this)" style="margin-top: 24px; padding: 8px 12px; background: var(--danger); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; min-width: 40px;" aria-label="Удалить участника" title="Удалить">×</button>
  `;
  listContainer.appendChild(row);
  
  // Применяем переводы к новой строке
  if (typeof AkylI18n !== 'undefined' && AkylI18n.applyI18n) {
    AkylI18n.applyI18n(AkylI18n.getLang(), row);
  }
}

function removeMemberRow(btn) {
  const row = btn.closest('.member-edit-row');
  if (row) {
    row.remove();
  }
}

function closeMembersEditModal(event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const modal = document.getElementById('membersEditModal');
  if (modal) {
    modal.style.display = 'none';
  }
}

async function saveMembers() {
  const listContainer = document.getElementById('membersEditList');
  if (!listContainer) return;
  
  const rows = listContainer.querySelectorAll('.member-edit-row');
  const members = [];
  
  rows.forEach(row => {
    const nameInput = row.querySelector('.member-name-input');
    const classInput = row.querySelector('.member-class-input');
    const name = (nameInput?.value || '').trim();
    const className = (classInput?.value || '').trim();
    
    // Добавляем только участников с указанным именем
    if (name) {
      members.push({
        name: name,
        class: className || null
      });
    }
  });
  
  const messageEl = document.getElementById('membersEditMessage');
  const btn = document.getElementById('saveMembersBtn');
  
  btn.disabled = true;
  btn.textContent = t('team.saving') || 'Сохранение...';
  
  try {
    const res = await fetch('/api/me', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json'
      },
      credentials: 'include',
      body: JSON.stringify({ members: members })
    });
    
    const j = await res.json();
    
    if (!res.ok || !j.ok) {
      const msg = j && j.error ? j.error : 'Не удалось сохранить изменения';
      messageEl.textContent = msg;
      messageEl.className = 'reset-message error';
      messageEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = t('team.save') || 'Сохранить';
      return;
    }
    
    // Обновляем данные команды
    teamData = j.team || teamData;
    if (teamData.members && typeof teamData.members === 'string') {
      try {
        teamData.members = JSON.parse(teamData.members);
      } catch {
        teamData.members = [];
      }
    }
    
    // Успешно
    messageEl.textContent = 'Участники успешно обновлены';
    messageEl.className = 'reset-message success';
    messageEl.style.display = 'block';
    
    setTimeout(() => {
      closeMembersEditModal();
      // Перерисовываем главную секцию
      renderHomeSection(document.getElementById('tabHome'));
    }, 1000);
    
  } catch (err) {
    console.error(err);
    messageEl.textContent = 'Произошла ошибка при сохранении. Попробуйте ещё раз.';
    messageEl.className = 'reset-message error';
    messageEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = t('team.save') || 'Сохранить';
  }
}

// Клавиатурная навигация для вкладок
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('keydown', (e) => {
    const tabs = Array.from(document.querySelectorAll('.tab-btn'));
    const currentIndex = tabs.indexOf(btn);
    
    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
      e.preventDefault();
      let nextIndex;
      if (e.key === 'ArrowRight') {
        nextIndex = (currentIndex + 1) % tabs.length;
      } else {
        nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
      }
      tabs[nextIndex].focus();
      tabs[nextIndex].click();
    } else if (e.key === 'Home') {
      e.preventDefault();
      tabs[0].focus();
      tabs[0].click();
    } else if (e.key === 'End') {
      e.preventDefault();
      tabs[tabs.length - 1].focus();
      tabs[tabs.length - 1].click();
    }
  });
});

// Обработчики вкладок + обновление URL (/team/<section>)
function attachTabHandlers() {
  const map = {
    tabHome: { section: 'main', render: renderHomeSection },
    tabTests: { section: 'tests', render: renderTestsSection },
    tabResults: { section: 'results', render: renderResultsSection },
    tabPractice: { section: 'practice', render: renderPracticeSection },
    tabRules: { section: 'rules', render: renderRulesSection }
  };

  Object.keys(map).forEach(id => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const { section, render } = map[id];
    btn.onclick = (e) => {
      const targetBtn = e.currentTarget;
      // Меняем URL, не перезагружая страницу
      const newPath = section === 'main' ? '/team/main' : `/team/${section}`;
      if (window.location.pathname !== newPath && window.history && window.history.pushState) {
        window.history.pushState({ section }, '', newPath);
      }
      render(targetBtn);
    };
  });
}

// Router для подстраниц: /team, /team/main, /team/tests, /team/results, /team/practice, /team/rules
function initTeamSectionFromUrl() {
  const path = window.location.pathname || '';
  const match = path.match(/^\/team\/([^/]+)/);
  const section = match ? match[1] : 'main';
  const map = {
    main: 'tabHome',
    tests: 'tabTests',
    results: 'tabResults',
    practice: 'tabPractice',
    rules: 'tabRules'
  };
  const btnId = map[section] || 'tabHome';
  const btn = document.getElementById(btnId);
  if (btn) {
    btn.click();
  } else {
    document.getElementById('tabHome').click();
  }
}

attachTabHandlers();
initTeamSectionFromUrl();

// Обработчики для закрытия модальных окон при клике вне их
document.addEventListener('click', (e) => {
  const fieldModal = document.getElementById('fieldEditModal');
  const membersModal = document.getElementById('membersEditModal');
  const passwordModal = document.getElementById('passwordChangeModal');
  
  // Закрываем только если клик был на самом модальном окне (фон), а не на содержимом
  if (fieldModal && fieldModal.style.display === 'flex' && e.target === fieldModal) {
    closeFieldEditModal();
  }
  if (membersModal && membersModal.style.display === 'flex' && e.target === membersModal) {
    closeMembersEditModal();
  }
  if (passwordModal && passwordModal.style.display === 'flex' && e.target === passwordModal) {
    closePasswordChangeModal();
  }
});

// Предотвращаем закрытие при клике на содержимое модального окна
// Выполняем после загрузки DOM
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.reset-modal-content').forEach(content => {
      content.addEventListener('click', (e) => {
        e.stopPropagation();
      });
    });
  });
} else {
  document.querySelectorAll('.reset-modal-content').forEach(content => {
    content.addEventListener('click', (e) => {
      e.stopPropagation();
    });
  });
}

// Обработчик Enter для сохранения в модальном окне редактирования поля
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && currentEditField) {
    const modal = document.getElementById('fieldEditModal');
    if (modal && modal.style.display === 'flex') {
      e.preventDefault();
      saveFieldEdit();
    }
  }
  if (e.key === 'Escape') {
    const fieldModal = document.getElementById('fieldEditModal');
    const membersModal = document.getElementById('membersEditModal');
    const passwordModal = document.getElementById('passwordChangeModal');
    
    if (fieldModal && fieldModal.style.display === 'flex') {
      closeFieldEditModal();
    } else if (membersModal && membersModal.style.display === 'flex') {
      closeMembersEditModal();
    } else if (passwordModal && passwordModal.style.display === 'flex') {
      closePasswordChangeModal();
    }
  }
});

// Обработчик изменения языка
window.addEventListener('akyl-langchange', () => {
  if (typeof AkylI18n !== 'undefined') {
    AkylI18n.applyI18n(AkylI18n.getLang());
    // Перезагружаем текущую вкладку
    const activeTab = document.querySelector('.tab-btn.active');
    if (activeTab) {
      activeTab.click();
    }
  }
});
